name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 0. Dependency Review ──────────────────────────────────────────────────
  # Bloque les PR qui introduisent des dépendances vulnérables.
  #
  # PRÉ-REQUIS : le "Dependency graph" doit être activé sur le dépôt :
  #   Settings → Code security and analysis → Dependency graph → Enable
  #
  # Si le dépôt est privé ou sur GitHub Free sans cette option,
  # ce job échoue silencieusement (continue-on-error: true) pour ne
  # pas bloquer la CI — activez le graph pour la protection complète.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Ne s'exécute que sur les PR (compare base..head)
    if: github.event_name == 'pull_request'
    # Ne bloque pas si le Dependency graph n'est pas activé sur ce dépôt.
    # Retirez cette ligne une fois le graph activé pour une protection stricte.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Bloque les dépendances avec une sévérité >= high
          fail-on-severity: high
          # Interdit les licences non-permissives
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1

  # ── 1. Analyse statique PHPStan ───────────────────────────────────────────
  phpstan:
    name: PHPStan (level 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: $(composer config cache-files-dir)
          key: composer-phpstan-${{ hashFiles('composer.json') }}

      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon --memory-limit=256M --no-progress

  # ── 2. Formatage PHP CS Fixer ─────────────────────────────────────────────
  cs-fixer:
    name: PHP CS Fixer (dry-run)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: $(composer config cache-files-dir)
          key: composer-csfixer-${{ hashFiles('composer.json') }}

      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check coding style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php

  # ── 3. Tests unitaires ────────────────────────────────────────────────────
  test-unit:
    name: Unit tests / PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest
    needs: [phpstan, cs-fixer]

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        symfony: ['6.4.*', '7.3.*']
        dependencies: ['highest']
        include:
          # Contraintes basses du composer.json (6.4.29+ minimum)
          - php: '8.2'
            symfony: '6.4.*'
            dependencies: 'lowest'

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2, flex
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Symfony version
        run: composer config extra.symfony.require "${{ matrix.symfony }}"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.symfony }}-${{ matrix.dependencies }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.symfony }}-${{ matrix.dependencies }}-
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install dependencies (highest)
        if: matrix.dependencies == 'highest'
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Install dependencies (lowest)
        if: matrix.dependencies == 'lowest'
        run: composer update --no-interaction --no-progress --prefer-dist --prefer-lowest --prefer-stable

      - name: Run Unit tests
        run: vendor/bin/phpunit --testsuite=Unit --colors=always

  # ── 4. Tests d'intégration ────────────────────────────────────────────────
  test-integration:
    name: Integration tests / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [phpstan, cs-fixer]

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        symfony: ['7.3.*']

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2, flex
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Symfony version
        run: composer config extra.symfony.require "${{ matrix.symfony }}"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-int-${{ matrix.php }}-${{ hashFiles('composer.json') }}

      - run: composer update --no-interaction --no-progress --prefer-dist

      - name: Run Integration tests
        run: vendor/bin/phpunit --testsuite=Integration --colors=always

  # ── 5. Couverture de code ─────────────────────────────────────────────────
  coverage:
    name: Coverage (PHP 8.3 / Symfony 7.1)
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug
          tools: composer:v2, flex

      - name: Configure Symfony version
        run: composer config extra.symfony.require "7.3.*"

      - run: composer update --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage/clover.xml --colors=always
        env:
          XDEBUG_MODE: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/clover.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
