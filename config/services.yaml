services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # ─── Cache de métadonnées (singleton) ──────────────────────────
    EricGansa\GhostTreesBundle\Metadata\GhostMetadata: ~

    # ─── Resolver : résolution + validation structurelle ────────────
    EricGansa\GhostTreesBundle\Resolver\GhostResolver:
        arguments:
            $maxDepth: '%ghost_trees.max_depth%'

    EricGansa\GhostTreesBundle\Contract\GhostResolverInterface:
        alias: EricGansa\GhostTreesBundle\Resolver\GhostResolver

    # ─── Inspector : introspection (debug, isMaterialized) ──────────
    EricGansa\GhostTreesBundle\Inspector\GhostInspector: ~

    EricGansa\GhostTreesBundle\Contract\GhostInspectorInterface:
        alias: EricGansa\GhostTreesBundle\Inspector\GhostInspector

    # ─── Incarnator : promotion fantôme → racine ────────────────────
    EricGansa\GhostTreesBundle\Incarnator\GhostIncarnator: ~

    EricGansa\GhostTreesBundle\Contract\GhostIncarnatorInterface:
        alias: EricGansa\GhostTreesBundle\Incarnator\GhostIncarnator

    # ─── Subscriber Doctrine : propagation + suppression ────────────
    EricGansa\GhostTreesBundle\EventSubscriber\GhostPropagationSubscriber:
        arguments:
            $autoPropagateCollections: '%ghost_trees.auto_propagate_collections%'
            $onRootDelete: '%ghost_trees.on_root_delete%'
        tags:
            - { name: doctrine.event_listener, event: onFlush }
            - { name: doctrine.event_listener, event: preRemove }

    # ─── Validateur de la contrainte #[GhostableField] ──────────────
    EricGansa\GhostTreesBundle\Validator\GhostableFieldValidator:
        tags:
            - { name: validator.constraint_validator }

    # ─── Commandes CLI ──────────────────────────────────────────────
    EricGansa\GhostTreesBundle\Command\DebugGhostsCommand:
        tags:
            - { name: console.command }

    EricGansa\GhostTreesBundle\Command\IncarnateGhostCommand:
        tags:
            - { name: console.command }
